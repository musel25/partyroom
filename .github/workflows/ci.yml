name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      # Dummy values just to satisfy env.ts's zod parse. The smoke
      # test doesn't actually exercise the DB or OAuth — it only hits
      # /signin and /api/auth/providers.
      DATABASE_URL: "postgresql://noone:nopass@127.0.0.1:5432/none"
      NEXTAUTH_URL: "http://127.0.0.1:3100"
      NEXTAUTH_SECRET: "ci-secret-ci-secret-ci-secret-ci-secret-ci"
      GOOGLE_CLIENT_ID: "ci-placeholder"
      GOOGLE_CLIENT_SECRET: "ci-placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
