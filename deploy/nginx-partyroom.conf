# Production nginx vhost for partyroom.
# Installed on the server at /etc/nginx/sites-available/partyroom.musel.dev
# and symlinked into /etc/nginx/sites-enabled/.

# Map for WebSocket upgrade — must be at http{} scope, so put it in conf.d
# or at the top of this file (nginx allows it before server{} blocks).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name partyroom.musel.dev;

    # ACME http-01 challenge for Let's Encrypt renewals — must stay open.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name partyroom.musel.dev;

    ssl_certificate     /etc/letsencrypt/live/partyroom.musel.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partyroom.musel.dev/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Body size — allow large chat? Default 1m is fine. Bumping to 2m for safety.
    client_max_body_size 2m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Socket.IO path needs WebSocket upgrade headers AND no response
    # buffering (otherwise long-poll responses get held until the
    # buffer fills, adding seconds of latency).
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;        # long-lived WS connections
        proxy_send_timeout 86400;
    }

    # Everything else — normal HTTP proxy.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
