services:
  app:
    image: ghcr.io/musel25/partyroom:latest
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bind to localhost only — the host nginx reverse-proxies to this.
      - "127.0.0.1:3000:3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_PASSWORD comes from .env.prod (via env_file).
    # User and DB are non-secret — hardcoded so they always match the connection string.
    env_file: .env.prod
    environment:
      POSTGRES_USER: partyroom
      POSTGRES_DB: partyroom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partyroom"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
